name: Build and Release

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'

    - name: Build binary
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
        GOPRIVATE: github.com/ML-PA-Consulting-GmbH/*
      run: |
        go build -o ubuntu-image-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/ubuntu-image/

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ubuntu-image-${{ matrix.goos }}-${{ matrix.goarch }}
        path: ubuntu-image-${{ matrix.goos }}-${{ matrix.goarch }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4

    - name: Create release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ubuntu-image-linux-amd64/ubuntu-image-linux-amd64
          ubuntu-image-linux-arm64/ubuntu-image-linux-arm64
