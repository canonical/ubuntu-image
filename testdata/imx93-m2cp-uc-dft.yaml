# Default-test recipe matching testdata/imx93-m2cp-uc-dft.json's
# snap set (13 snaps; names match the reference JSON byte-for-byte).
#
# Versions are looked up from the operator's official versions list
# where the name appears there; snaps not in that list have version
# left empty. The build flow (which requires every snap to pin a
# version) will fail clearly on those -- that's the signal for the
# operator to either supply the version or remove the snap.

model:
  name: imx93-m2cp-uc-dft
  architecture: arm64
  base: core24
  grade: signed
  storage-safety: prefer-encrypted

snaps:
  - name: m2cp-os-imx93-gadget
    type: gadget
    version: "6.1.6"
  - name: m2cp-os-imx93-kernel
    type: kernel
    version: "6.1.5"
  - name: core20
    type: base
    version: "1.2.0"
  - name: core22
    type: base
    version: "1.2.0"
  - name: core24
    type: base
    version: "1.2.0"
  - name: snapd
    type: snapd
    version: "4.3.0.42"
  - name: m2cp-gateway
    type: app
    version: "3.1.0"
  - name: m2cp-message-hub
    type: app
    version: "4.4.0"
  - name: m2cp-sys-net-lte-coap
    type: app
    version: ""
  - name: m2cp-sys-timesync
    type: app
    version: "2.2.0"
  - name: m2cp-coap
    type: app
    version: "6.4.0"
  - name: m2cp-config-knorr
    type: app
    version: ""
  - name: m2cp-coap-knorr
    type: app
    version: ""
