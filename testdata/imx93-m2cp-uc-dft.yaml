# Test recipe matching testdata/imx93-m2cp-uc-dft.json's snap set.
# Used to verify the render-and-push pipeline against a known model.
#
# Versions known from the operator's "latest" list are filled in.
# Snaps whose latest version we don't have a reference for are
# left at "0.0.0" -- the model-render path doesn't need versions,
# but builds will fail at the revision-resolution step until real
# values are supplied.

model:
  name: imx93-m2cp-uc-dft
  architecture: arm64
  base: core24
  grade: signed
  storage-safety: prefer-encrypted

snaps:
  - name: m2cp-os-imx93-gadget
    type: gadget
    version: "0.0.0"
  - name: m2cp-os-imx93-kernel
    type: kernel
    version: "0.0.0"
  - name: core20
    type: base
    version: "1.2.0"
  - name: core22
    type: base
    version: "1.2.0"
  - name: core24
    type: base
    version: "1.2.0"
  - name: snapd
    type: snapd
    version: "4.3.0.42"
  - name: m2cp-gateway
    type: app
    version: "3.1.0"
  - name: m2cp-message-hub
    type: app
    version: "4.4.0"
  - name: m2cp-sys-net-lte-coap
    type: app
    version: "0.0.0"
  - name: m2cp-sys-timesync
    type: app
    version: "2.2.0"
  - name: m2cp-coap
    type: app
    version: "6.4.0"
  - name: m2cp-config-knorr
    type: app
    version: "0.0.0"
  - name: m2cp-coap-knorr
    type: app
    version: "0.0.0"
