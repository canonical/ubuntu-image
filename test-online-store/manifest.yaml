    version: "1.2.0"
  - name: core24
    version: "1.2.0"
  - name: mlpa-os-imx-kernel
    version: "6.1.5"
  - name: mlpa-os-imx93-arm64-gadget
    version: "6.1.6"
  - name: m2cp-coap
    version: "6.4.0"
  - name: m2cp-gateway
    version: "3.1.0"
  - name: m2cp-message-hub
    version: "4.4.0"
  - name: m2cp-sys-timesync
    version: "2.2.0"
  - name: m2cp-vtg-config
    version: "1.1.1"
  - name: m2cp-vtg-net-lte-uart
    version: "1.2.1"
